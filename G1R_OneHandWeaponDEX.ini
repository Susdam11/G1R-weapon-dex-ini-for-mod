; OneHandWeaponDEX — config
; One-handed weapons require & scale with Dexterity instead of Strength.
; The mirror of GothicCrossbowSTR. Only ENABLED weapons (below) are converted.

[Settings]
; master on/off for the whole mod. 0 = full vanilla (nothing converted).
Enabled = 1

; How much each point of Dexterity ADDS to a converted sword's damage (on top of vanilla).
;   damage = vanillaWeaponDamage + Dexterity * Scale
;   > 0 : sword REQUIRES Dexterity AND gains +Dexterity*Scale damage. 0.2 (default) is
;         a modest bonus so a pure-Dexterity (bow) build gets a usable melee option
;         without spending LP on Strength. Raise it if you want more.
;   = 0 : sword REQUIRES Dexterity but damage is left VANILLA (access-only).
; (A pure Dexterity build has ~0 Strength, so net damage is just vanilla + DEX*Scale.)
Scale = 0

; verbose logging to UE4SS.log (0 = quiet, 1 = debug)
DebugLogging = 0

; ---------------------------------------------------------------------------
; Per-weapon enable. Each weapon is its own [Section], named after its in-game
; name + base damage (English names from the mobalytics G1R weapon guide,
; cross-checked against the UE4SS stat dump so they're reliable). The value is
; just the flag: 1 = convert this weapon to Dexterity (+scaling if Scale>0),
; 0 = leave it vanilla. DEFAULT: SWORDS on (the Dex/light lane); AXES & MACES off
; (the Strength lane). The [Section] headers are labels only — what the mod reads
; is the ItMw_..._ENABLED key and its 0/1 value.
; ---------------------------------------------------------------------------

